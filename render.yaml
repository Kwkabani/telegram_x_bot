services:
  - type: web
    name: telegram-x-bot
    runtime: python
    repo: https://github.com/Kwkabani/telegram_x_bot
    plan: free
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_CALLBACK_URL
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
