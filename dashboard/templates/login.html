<!DOCTYPE html>
<html dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · X Bot Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #e1e1e1; display: flex; align-items: center;
            justify-content: center; min-height: 100vh; margin: 0;
        }
        .box {
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 40px; width: 340px;
        }
        .box h1 { font-size: 20px; margin-bottom: 6px; }
        .box p { color: #888; font-size: 13px; margin-bottom: 24px; }
        input[type=password] {
            width: 100%; background: #0f0f0f; border: 1px solid #333; color: #e1e1e1;
            padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 14px;
        }
        input[type=password]:focus { border-color: #6b9aff; outline: none; }
        button {
            width: 100%; padding: 10px; background: #6b9aff; color: #000;
            border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #5a89ee; }
        .error { color: #f87171; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>🔐 X Bot Dashboard</h1>
        <p>Enter admin password to continue</p>
        <form method="post">
            <input type="hidden" name="next_url" value="{{ next_url }}">
            <input type="password" name="password" placeholder="Admin password" autofocus>
            <button type="submit">Login</button>
        </form>
        {% if error %}<div class="error">❌ Incorrect password</div>{% endif %}
    </div>
</body>
</html>
