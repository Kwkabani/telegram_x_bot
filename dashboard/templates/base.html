<!DOCTYPE html>
<html dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="{{ refresh_interval }}">
    <title>X Bot Dashboard</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #e1e1e1; min-height: 100vh;
        }
        .layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px; background: #1a1a1a; padding: 20px 0;
            border-right: 1px solid #2a2a2a; flex-shrink: 0;
        }
        .sidebar h2 { padding: 0 20px 20px; font-size: 16px; color: #6b9aff; }
        .sidebar a {
            display: block; padding: 10px 20px; color: #aaa; text-decoration: none;
            font-size: 14px; transition: .2s;
        }
        .sidebar a:hover, .sidebar a.active { background: #252525; color: #fff; }
        .sidebar a.logout { margin-top: 30px; color: #f66; }
        .main { flex: 1; padding: 24px; overflow-x: auto; }
        .header { margin-bottom: 24px; }
        .header h1 { font-size: 22px; }
        .header p { color: #888; font-size: 13px; margin-top: 4px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
        .card {
            background: #1a1a1a; border-radius: 10px; padding: 16px 20px;
            border: 1px solid #2a2a2a;
        }
        .card .num { font-size: 28px; font-weight: 700; color: #6b9aff; }
        .card .label { font-size: 12px; color: #888; margin-top: 4px; }
        table {
            width: 100%; border-collapse: collapse; font-size: 13px;
            background: #1a1a1a; border-radius: 10px; overflow: hidden;
        }
        th { text-align: left; padding: 10px 14px; background: #252525; color: #999; font-weight: 500; }
        td { padding: 10px 14px; border-top: 1px solid #2a2a2a; }
        tr:hover td { background: #222; }
        .badge {
            display: inline-block; padding: 2px 9px; border-radius: 20px;
            font-size: 11px; font-weight: 600;
        }
        .badge-green { background: #1a3a2a; color: #4ade80; }
        .badge-yellow { background: #3a3520; color: #facc15; }
        .badge-red { background: #3a1a1a; color: #f87171; }
        .badge-gray { background: #2a2a2a; color: #999; }
        .btn {
            display: inline-block; padding: 6px 14px; border-radius: 6px;
            font-size: 12px; text-decoration: none; cursor: pointer; border: none;
            transition: .2s;
        }
        .btn-danger { background: #3a1a1a; color: #f87171; }
        .btn-danger:hover { background: #5a2a2a; }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        input, select {
            background: #1a1a1a; border: 1px solid #333; color: #e1e1e1;
            padding: 8px 12px; border-radius: 6px; font-size: 13px;
        }
        .filter-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-bar form { display: flex; gap: 10px; align-items: center; }
        .mono { font-family: 'Courier New', monospace; font-size: 12px; }
        .log-area {
            background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px;
            padding: 14px; max-height: 70vh; overflow-y: auto; font-size: 12px;
        }
        .log-area .line { padding: 2px 0; color: #aaa; }
        .log-area .line:hover { color: #fff; background: #111; }
        .text-muted { color: #888; }
        .mt-2 { margin-top: 10px; }
        .mb-2 { margin-bottom: 10px; }
        .truncate { max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; }
        @media (max-width: 700px) {
            .sidebar { display: none; }
            .main { padding: 14px; }
            .cards { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="layout">
    <nav class="sidebar">
        <h2>📊 X Bot Panel</h2>
        <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}">📈 Overview</a>
        <a href="/users" class="{{ 'active' if request.url.path.startswith('/users') else '' }}">👥 Users</a>
        <a href="/posts" class="{{ 'active' if request.url.path.startswith('/posts') else '' }}">📝 Posts</a>
        <a href="/logs" class="{{ 'active' if request.url.path == '/logs' else '' }}">📋 Logs</a>
        <a href="/scheduler" class="{{ 'active' if request.url.path == '/scheduler' else '' }}">⏱️ Scheduler</a>
        <a href="/settings" class="{{ 'active' if request.url.path.startswith('/settings') else '' }}">⚙️ Settings</a>
        <div style="padding: 60px 20px 10px;font-size:12px;color:#555;border-top:1px solid #2a2a2a;margin-top:20px;">
            <div>Bot Status</div>
            <div id="bot-status" style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:13px;font-weight:600;color:#888;">
                <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#888;" id="status-dot"></span>
                <span id="status-text">checking...</span>
            </div>
        </div>
        <a href="/logout" class="logout">🚪 Logout</a>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
</div>
<script>
(function checkStatus(){ var x=new XMLHttpRequest(); x.open('GET','/api/bot/status',true); x.onload=function(){ if(x.status==200){ var d=JSON.parse(x.responseText); var dot=document.getElementById('status-dot'); var txt=document.getElementById('status-text'); if(d.paused){ dot.style.background='#facc15'; txt.style.color='#facc15'; txt.textContent='Paused'; } else { dot.style.background='#4ade80'; txt.style.color='#4ade80'; txt.textContent='Online'; } } }; x.send(); setTimeout(checkStatus,10000); })();
</script>
</body>
</html>
